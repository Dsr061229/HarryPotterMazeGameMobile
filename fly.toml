app = "harrypotter-maze-game"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"
  DATA_DIR = "/app/data"

[[mounts]]
  source = "maze_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
